<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Jogos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gerenciamento de Jogos e Empréstimos</h1>

  <section id="jogos">
    <h2>Jogos</h2>
    <button id="carregarJogos">Carregar Jogos</button>
    <ul id="listaJogos"></ul>

    <h3>Cadastrar Novo Jogo</h3>
    <form id="formJogo">
      <input type="text" id="titulo" placeholder="Título" required>
      <input type="text" id="genero" placeholder="Gênero" required>
      <input type="number" id="ano" placeholder="Ano" required>
      <label><input type="checkbox" id="disponivel"> Disponível</label>
      <button type="submit">Cadastrar</button>
    </form>
    <div id="mensagemJogo"></div>
  </section>

  <section id="emprestimos">
    <h2>Empréstimos</h2>
    <button id="carregarEmprestimos">Carregar Empréstimos</button>
    <ul id="listaEmprestimos"></ul>

    <h3>Cadastrar Novo Empréstimo</h3>
    <form id="formEmprestimo">
      <input type="number" id="jogoId" placeholder="ID do Jogo" required>
      <input type="text" id="usuario" placeholder="Usuário" required>
      <input type="date" id="dataEmprestimo" required>
      <label><input type="checkbox" id="devolvido"> Devolvido</label>
      <button type="submit">Cadastrar</button>
    </form>
    <div id="mensagemEmprestimo"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
