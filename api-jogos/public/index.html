<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerenciamento de Jogos</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Gerenciamento de Animais e Vendas</h1>

  <section id="animais">
    <h2>Animais</h2>
    <button id="carregarAnimais">Carregar Animais</button>
    <ul id="listaAnimais"></ul>

    <h3>Cadastrar Novo Animal</h3>
    <form id="formAnimal">
      <input type="text" id="nome" placeholder="Nome" required>
      <input type="text" id="especie" placeholder="Espécie" required>
      <input type="number" id="preco" step="0.01" placeholder="Preço" required>
      <label><input type="checkbox" id="disponivel"> Disponível</label>
      <button type="submit">Cadastrar</button>
    </form>
    <div id="mensagemAnimal"></div>
  </section>

  <section id="vendas">
    <h2>Vendas</h2>
    <button id="carregarVendas">Carregar Vendas</button>
    <ul id="listaVendas"></ul>

    <h3>Cadastrar Nova Venda</h3>
    <form id="formVenda">
      <input type="number" id="animalId" placeholder="ID do Animal" required>
      <input type="text" id="cliente" placeholder="Cliente" required>
      <input type="date" id="dataVenda" required>
      <input type="number" id="quantidade" placeholder="Quantidade" required>
      <button type="submit">Cadastrar</button>
    </form>
    <div id="mensagemVenda"></div>
  </section>

  <script src="app.js"></script>
</body>
</html>
